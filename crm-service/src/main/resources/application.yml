server:
  port: 8081
spring:
  application:
    name: crm-service
  datasource:
    url: ${CRM_DB_URL:jdbc:postgresql://localhost:5432/order_system?currentSchema=crm}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    default-schema: crm
    baseline-on-migrate: true
    baseline-version: 0
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:order_app}
    password: ${RABBITMQ_PASSWORD:order_app_dev}
integrations:
  orchestrator-base-url: ${ORCHESTRATOR_BASE_URL:http://localhost:8084}
  internal-api-key: ${INTERNAL_API_KEY:local-development-key}
  ui-origin: ${CRM_UI_ORIGIN:http://localhost:5173}
logging:
  level:
    com.berke.orders: DEBUG
management:
  endpoints:
    web:
      exposure:
        include: health
