server:
  port: 8083
spring:
  application:
    name: subscriber-service
  datasource:
    url: ${SUBSCRIBER_DB_URL:jdbc:postgresql://localhost:5432/order_system?currentSchema=subscriber}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    default-schema: subscriber
    baseline-on-migrate: true
    baseline-version: 0
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:order_app}
    password: ${RABBITMQ_PASSWORD:order_app_dev}
    listener:
      simple:
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 500ms
          multiplier: 2
          max-interval: 5s
          max-attempts: 5
integrations:
  internal-api-key: ${INTERNAL_API_KEY:local-development-key}
logging:
  level:
    com.berke.orders: DEBUG
management:
  endpoints:
    web:
      exposure:
        include: health
