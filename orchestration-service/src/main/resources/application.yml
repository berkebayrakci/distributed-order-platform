server:
  port: 8084
spring:
  application:
    name: orchestration-service
  datasource:
    url: ${ORCHESTRATOR_DB_URL:jdbc:postgresql://localhost:5432/order_system?currentSchema=orchestrator}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    default-schema: orchestrator
    baseline-on-migrate: true
    baseline-version: 0
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:order_app}
    password: ${RABBITMQ_PASSWORD:order_app_dev}
integrations:
  catalog-base-url: ${CATALOG_BASE_URL:http://localhost:8082}
  subscriber-base-url: ${SUBSCRIBER_BASE_URL:http://localhost:8083}
  crm-base-url: ${CRM_BASE_URL:http://localhost:8081}
  internal-api-key: ${INTERNAL_API_KEY:local-development-key}
callback-outbox:
  poll-interval: ${CALLBACK_OUTBOX_POLL_INTERVAL:1s}
  batch-size: ${CALLBACK_OUTBOX_BATCH_SIZE:20}
  max-attempts: ${CALLBACK_OUTBOX_MAX_ATTEMPTS:6}
  initial-backoff: ${CALLBACK_OUTBOX_INITIAL_BACKOFF:1s}
  backoff-multiplier: ${CALLBACK_OUTBOX_BACKOFF_MULTIPLIER:2.0}
  max-backoff: ${CALLBACK_OUTBOX_MAX_BACKOFF:1m}
  processing-timeout: ${CALLBACK_OUTBOX_PROCESSING_TIMEOUT:2m}
logging:
  level:
    com.berke.orders: DEBUG
management:
  endpoints:
    web:
      exposure:
        include: health
